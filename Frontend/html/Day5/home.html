<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <input type="text"><br><br>
        <button type="button">simple button</button> <br><br>
        <button type="reset">reset button</button><br><br>
        <button type="submit">submit button</button><br><br>
        <button>click</button>
    </form><br><br>

    
    <form action="">

        <!--checkbox allows you multiple selection 
    <label> -> used when i will clik on text then it automactically
             check the checkbox
     id -> for identfication 
    -->
    <p>checkbox</p>
    <input type="checkbox" id="a">
    <label for="a">Marathi</label>
    <input type="checkbox" id="b">
    <label for="b">Hindi</label>
    <input type="checkbox"  id="c">
    <label for="c">English</label>
    <button>click </button>
    </form>
    <br><br>
    
    <!--radio button 
       check the button at the one time (single selection)
        mandatory to  give for radio button name = same name for all readio button 
    -->
    <form action="">
    <p>radio buttons</p>
        <input type="radio" id="male" name="gender">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender">
        <label for="female">Female</label>
        <input type="radio" id="other" name="gender">
        <label for="other">other</label>
        <button>click </button>

        <input type="range" min="0" max="5
        ">
    </form>

    <!--range type -->
 

</body>
</html>
