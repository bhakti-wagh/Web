    <form action="">
        <!-- text fieldd   -->
         <p>
            <label for="username">username:</label>
            <input type="text" id="username" name="username" placeholder="Enter username">
         </p>

          <!-- password field -->
           <p>
            <label for="usrpassword">password :</label>
            <input type="password" name="userpassword" id="usrpassword">
           </p>

           <!-- drop down selectiopn -->
            <p>
                <label for="country">country: </label>
                <select name="country" id="country">
                    <option value="usa">USA</option>
                    <option value="canada">Canada</option>
                    <option value="uk">UK</option>
                </select>
            </p>

            <!-- radio buttons -->
             <p>
                <input type="radio" id="male" name="gender">
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender">
                <label for="female">Female</label>
                <input type="radio" id="other" name="gender">
                <label for="other">Other</label>

             </p>

             <!-- checkbox(choose multiple) -->
              <p>
                <input type="checkbox" id="sub" value="yes">
                <label for="sub">Subscribe to newsletter</label>
              </p>

            <!-- submit button -->
              <button>submit form </button>
